ekf_filter_node:
  ros__parameters:
    frequency: 10.0
    sensor_timeout: 0.5
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # IMU as angular velocity and linear acceleration input (no orientation in data_raw)
    imu0: /imu/data_raw
    imu0_config: [false, false, false,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  true]
    imu0_differential: false
    imu0_relative: false

    use_control: false
    stamped_control: false
    print_diagnostics: true