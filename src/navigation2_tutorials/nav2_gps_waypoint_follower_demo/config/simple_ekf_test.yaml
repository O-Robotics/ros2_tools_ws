# Simplified EKF configuration for testing
# Focus on getting basic odom + IMU fusion working

ekf_filter_node_odom:
  ros__parameters:
    frequency: 2.0  # Further reduced for better performance
    two_d_mode: true
    print_diagnostics: true
    debug: false
    publish_tf: true
    
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Simplified odom configuration
    odom0: /odom
    odom0_config: [true,  true,  false,
                  false, false, false,
                  true,  true,  false,
                  false, false, false,
                  false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 1.0

    # Simplified IMU configuration
    imu0: /imu/data_raw
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, false,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 0.8
    imu0_linear_acceleration_rejection_threshold: 0.8

    use_control: false
    
    # Conservative process noise
