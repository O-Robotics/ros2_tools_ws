# Global EKF Node (map frame)  
ekf_filter_node_map:
  ros__parameters:
    frequency: 2.0
    two_d_mode: true
    print_diagnostics: true
    debug: false
    publish_tf: true
    
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    # Use local EKF output and GPS for global fusion
    odom0: /odometry/local
    odom0_config: [true,  true,  false,
                  false, false, false,
                  true,  true,  false,
                  false, false, true,
                  false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 1.0

    # GPS-converted odometry data
    odom1: /odometry/gps
