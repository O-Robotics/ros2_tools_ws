defaults:
  required:
    - /hardware_layer/imu/data_raw
    - /hardware_layer/diff_cont/odom
    - /tf
    - /tf_static
  optional:
    # These are not required but valuable for debugging wildly covariance issues
    - /parameter_events
    - /diagnostics
  debug:
    # Only record when needed
    - /rosout
    - /navigation_layer/odometry/global
    - /navigation_layer/odometry/local

phases:
  stationary:
    description: "Record stationary data to measure baseline noise and bias drift"
    duration_recommended: 60  # seconds
    add: []
    remove: []
    
  slow_spin:
    description: "Record slow rotation data to measure angular velocity noise during motion"
    duration_recommended: 90  # seconds
    add:
      - /cmd_vel  # If rotation is commanded through control
    remove: []
    
  slow_straight:
    description: "Record slow straight motion to measure linear acceleration and odometry noise"
    duration_recommended: 90  # seconds
    add:
      - /cmd_vel
    remove: []

# Recording parameters
recording:
  compression_mode: "file"
  compression_format: "zstd"
  storage_format: "sqlite3"
  
# Quality checks
quality:
  min_duration: 30  # Minimum recording duration in seconds
  max_gap: 1.0      # Maximum acceptable gap between messages in seconds
  min_rate:
    imu: 10.0       # Minimum IMU rate in Hz
    odom: 10.0      # Minimum odometry rate in Hz
